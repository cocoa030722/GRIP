<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GRIP — 소비자 결제</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <nav class="navbar">
    <a class="nav-brand" href="/">GRIP</a>
    <div class="nav-actions" id="navActions"></div>
  </nav>

  <main class="main-content">

    <!-- 소비자 정보 카드 -->
    <section class="consumer-info" id="consumerInfo">
      <h2 class="section-title">내 정보</h2>
      <div class="info-card">
        <p>이메일: <strong id="consumerEmail"></strong></p>
        <p>잔액: <strong id="consumerBalance"></strong> 원</p>
      </div>
    </section>

    <!-- 위치 동의 안내 -->
    <section class="location-consent" id="locationConsent">
      <div class="location-status" id="locationStatus">
        <!-- TODO:FRONTEND - Geolocation 동의 상태 표시 (허용/거부/대기) -->
        <!-- 거부 시: "위치 정보 동의가 필요합니다" 안내 + 결제 폼 비활성화 -->
      </div>
    </section>

    <!-- QR 스캔 및 결제 폼 -->
    <section class="consumer-payment" id="consumerPaymentSection">
      <h2 class="section-title">QR 결제</h2>

      <form class="payment-form" id="paymentForm">
        <div class="form-group">
          <label for="qrPayload">QR 페이로드</label>
          <!-- TODO:FRONTEND - QR 카메라 스캔 또는 수동 입력 -->
          <input type="text" id="qrPayload" name="qr_payload" required placeholder="QR을 스캔하거나 페이로드를 입력하세요" />
        </div>

        <div class="form-group">
          <label for="payAmount">결제 금액 (원)</label>
          <input type="number" id="payAmount" name="amount" min="1" required placeholder="예: 5000" />
        </div>

        <div class="form-error" id="paymentError"></div>

        <!-- TODO:FRONTEND - 위치 동의 거부 시 버튼 비활성화 -->
        <button type="submit" class="btn btn-primary" id="payBtn">결제하기</button>
      </form>
    </section>

    <!-- 결제 결과 -->
    <section class="payment-result hidden" id="paymentResult">
      <!-- TODO:FRONTEND - 성공/실패 메시지 및 차감된 잔액 표시 -->
    </section>

    <!-- 거래 내역 -->
    <section class="transaction-history" id="txHistory">
      <h2 class="section-title">결제 내역</h2>
      <table class="tx-table">
        <thead>
          <tr>
            <th>일시</th>
            <th>상점</th>
            <th>금액</th>
          </tr>
        </thead>
        <tbody id="txTableBody">
          <!-- TODO:FRONTEND - GET /api/payments/history 결과 렌더링 -->
        </tbody>
      </table>
    </section>

  </main>

  <script src="/js/api.js"></script>
  <!-- TODO:FRONTEND - /js/payment.js 구현 후 연결 -->
  <script>
    // Phase 2: 인증 가드만 수행. 비즈니스 로직은 Phase 3에서 구현.
    (function guard() {
      const user = API.getUser();
      if (!user || user.role !== 'consumer') {
        location.href = '/';
      } else {
        document.getElementById('consumerEmail').textContent   = user.email;
        document.getElementById('consumerBalance').textContent = (user.balance ?? 0).toLocaleString();
      }
    })();
  </script>
</body>
</html>
