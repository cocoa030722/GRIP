<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GRIP — 전통시장 QR 결제</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <!-- 네비게이션 -->
  <nav class="navbar">
    <span class="nav-brand">GRIP</span>
    <div class="nav-actions" id="navActions">
      <!-- JS로 채워짐 -->
    </div>
  </nav>

  <!-- 히어로 헤더 -->
  <div class="hero-header">
    <h1 class="hero-title">GRIP</h1>
    <p class="hero-sub">전통시장 QR 결제 보안 시스템</p>
    <div class="hero-badges">
      <span class="hero-badge">QR 위변조 탐지</span>
      <span class="hero-badge">SQL Injection 방어</span>
      <span class="hero-badge">AI 이상 탐지</span>
    </div>
  </div>

  <!-- 메인 컨텐츠 -->
  <main class="main-content">

    <!-- 인증 패널 (로그아웃 상태) -->
    <section class="auth-panel" id="authPanel">
      <!-- 탭 -->
      <div class="tab-bar">
        <button class="tab-btn active" id="tabLogin" onclick="showTab('login')">로그인</button>
        <button class="tab-btn"        id="tabRegister" onclick="showTab('register')">회원가입</button>
      </div>

      <!-- 로그인 폼 -->
      <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)">
        <h2 class="form-title">로그인</h2>
        <div class="form-group">
          <label for="loginEmail">이메일</label>
          <input type="email" id="loginEmail" name="email" required placeholder="user@example.com" />
        </div>
        <div class="form-group">
          <label for="loginPassword">비밀번호</label>
          <input type="password" id="loginPassword" name="password" required placeholder="비밀번호 입력" />
        </div>
        <div class="form-error" id="loginError"></div>
        <button type="submit" class="btn btn-primary">로그인</button>
      </form>

      <!-- 회원가입 폼 -->
      <form id="registerForm" class="auth-form hidden" onsubmit="handleRegister(event)">
        <h2 class="form-title">회원가입</h2>
        <div class="form-group">
          <label for="regEmail">이메일</label>
          <input type="email" id="regEmail" name="email" required placeholder="user@example.com" />
        </div>
        <div class="form-group">
          <label for="regPassword">비밀번호 <small>(8자 이상)</small></label>
          <input type="password" id="regPassword" name="password" required placeholder="비밀번호 입력" minlength="8" />
        </div>
        <div class="form-group">
          <label for="regRole">역할</label>
          <select id="regRole" name="role" required>
            <option value="">선택하세요</option>
            <option value="consumer">소비자 (Consumer)</option>
            <option value="merchant">상인 (Merchant)</option>
            <option value="admin">관리자 (Admin)</option>
          </select>
        </div>
        <div class="form-error" id="registerError"></div>
        <button type="submit" class="btn btn-primary">회원가입</button>
      </form>
    </section>

    <!-- 로그인된 상태 패널 -->
    <section class="dashboard-panel hidden" id="dashboardPanel">
      <div class="user-card">
        <h2 id="welcomeMsg">안녕하세요</h2>
        <p>역할: <strong id="userRole"></strong></p>
        <p>잔액: <strong id="userBalance"></strong> 원</p>
      </div>

      <!-- 상인 전용 -->
      <div id="merchantPanel" class="role-panel hidden">
        <h3>QR 결제 발급</h3>
        <p>QR 발급은 상인 전용 페이지에서 진행합니다.</p>
        <a href="/merchant.html" class="btn btn-primary">상인 페이지로</a>
      </div>

      <!-- 소비자 전용 -->
      <div id="consumerPanel" class="role-panel hidden">
        <h3>QR 결제</h3>
        <p>QR 스캔 및 결제는 소비자 전용 페이지에서 진행합니다.</p>
        <a href="/payment.html" class="btn btn-primary">결제 페이지로</a>
      </div>

      <!-- 관리자 전용 -->
      <div id="adminPanel" class="role-panel hidden">
        <h3>관리자 대시보드</h3>
        <a href="/dashboard.html" class="btn btn-primary">대시보드로</a>
      </div>
    </section>

  </main>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
