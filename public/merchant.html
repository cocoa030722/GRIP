<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GRIP — 상인 QR 발급</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <nav class="navbar">
    <a class="nav-brand" href="/">GRIP</a>
    <div class="nav-actions" id="navActions"></div>
  </nav>

  <main class="main-content">

    <!-- 상인 정보 카드 -->
    <section class="merchant-info" id="merchantInfo">
      <h2 class="section-title">상인 정보</h2>
      <div class="info-card">
        <p>이메일: <strong id="merchantEmail"></strong></p>
        <p>잔액: <strong id="merchantBalance"></strong> 원</p>
      </div>
    </section>

    <!-- QR 발급 폼 -->
    <section class="merchant-qr" id="merchantQrSection">
      <h2 class="section-title">QR 발급</h2>

      <form class="qr-form" id="qrForm">
        <div class="form-group">
          <label for="qrAmount">결제 금액 (원)</label>
          <input type="number" id="qrAmount" name="amount" min="1" required placeholder="예: 5000" />
        </div>

        <div class="location-status" id="locationStatus"></div>
        <button type="button" class="btn btn-outline" id="locationRetryBtn" style="display:none">위치 허용하기</button>

        <button type="submit" class="btn btn-primary" id="qrGenerateBtn">QR 생성</button>
      </form>

      <div class="form-error" id="qrError"></div>
    </section>

    <!-- 발급된 QR 표시 -->
    <section class="qr-result hidden" id="qrResult">
      <h2 class="section-title">발급된 QR</h2>

      <div class="qr-display" id="qrDisplay"></div>

      <div class="qr-meta">
        <p>QR ID: <code id="qrId"></code></p>
        <p class="qr-notice">QR을 새로 발급하면 이전 QR은 자동으로 무효화됩니다.</p>
      </div>

      <button class="btn btn-outline" id="qrRefreshBtn" type="button">새 QR 발급</button>
    </section>

    <!-- 거래 내역 -->
    <section class="transaction-history" id="txHistory">
      <h2 class="section-title">최근 거래 내역</h2>
      <table class="tx-table">
        <thead>
          <tr>
            <th>일시</th>
            <th>소비자</th>
            <th>금액</th>
          </tr>
        </thead>
        <tbody id="txTableBody"></tbody>
      </table>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/payment.js"></script>
</body>
</html>
