<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GRIP — 상인 QR 발급</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <nav class="navbar">
    <a class="nav-brand" href="/">GRIP</a>
    <div class="nav-actions" id="navActions"></div>
  </nav>

  <main class="main-content">

    <!-- 상인 정보 카드 -->
    <section class="merchant-info" id="merchantInfo">
      <h2 class="section-title">상인 정보</h2>
      <div class="info-card">
        <p>이메일: <strong id="merchantEmail"></strong></p>
        <p>잔액: <strong id="merchantBalance"></strong> 원</p>
      </div>
    </section>

    <!-- QR 발급 폼 -->
    <section class="merchant-qr" id="merchantQrSection">
      <h2 class="section-title">QR 발급</h2>

      <form class="qr-form" id="qrForm">
        <div class="form-group">
          <label for="qrAmount">결제 금액 (원)</label>
          <!-- TODO:FRONTEND - 금액 입력 유효성 검사 -->
          <input type="number" id="qrAmount" name="amount" min="1" required placeholder="예: 5000" />
        </div>

        <div class="location-status" id="locationStatus">
          <!-- TODO:FRONTEND - Geolocation 동의 상태 표시 (허용/거부/대기) -->
        </div>

        <!-- TODO:FRONTEND - 위치 동의 거부 시 버튼 비활성화 -->
        <button type="submit" class="btn btn-primary" id="qrGenerateBtn">QR 생성</button>
      </form>

      <div class="form-error" id="qrError"></div>
    </section>

    <!-- 발급된 QR 표시 -->
    <section class="qr-result hidden" id="qrResult">
      <h2 class="section-title">발급된 QR</h2>

      <div class="qr-display" id="qrDisplay">
        <!-- TODO:FRONTEND - QR 이미지 또는 페이로드 텍스트 표시 -->
      </div>

      <div class="qr-meta">
        <p>QR ID: <code id="qrId"></code></p>
        <p class="qr-notice">QR을 새로 발급하면 이전 QR은 자동으로 무효화됩니다.</p>
      </div>

      <!-- TODO:FRONTEND - QR 갱신 버튼 -->
      <button class="btn btn-outline" id="qrRefreshBtn" type="button">새 QR 발급</button>
    </section>

    <!-- 거래 내역 -->
    <section class="transaction-history" id="txHistory">
      <h2 class="section-title">최근 거래 내역</h2>
      <table class="tx-table">
        <thead>
          <tr>
            <th>일시</th>
            <th>소비자</th>
            <th>금액</th>
          </tr>
        </thead>
        <tbody id="txTableBody">
          <!-- TODO:FRONTEND - GET /api/payments/history 결과 렌더링 -->
        </tbody>
      </table>
    </section>

  </main>

  <script src="/js/api.js"></script>
  <!-- TODO:FRONTEND - /js/payment.js 구현 후 연결 -->
  <script>
    // Phase 2: 인증 가드만 수행. 비즈니스 로직은 Phase 3에서 구현.
    (function guard() {
      const user = API.getUser();
      if (!user || user.role !== 'merchant') {
        location.href = '/';
      } else {
        document.getElementById('merchantEmail').textContent  = user.email;
        document.getElementById('merchantBalance').textContent = (user.balance ?? 0).toLocaleString();
      }
    })();
  </script>
</body>
</html>
